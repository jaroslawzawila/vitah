<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ViTAH — Tecnología para vivir mejor</title>
    <meta
      name="description"
      content="ViTAH — PropTech para hogares saludables, eficientes e inteligentes. Estamos construyendo algo grande."
    />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="ViTAH">
        <span class="brand-mark">ViTAH</span>
        <span class="brand-descriptor">Tecnología para vivir mejor</span>
      </a>
    </header>

    <main class="hero">
      <div class="hero-content">
        <p class="eyebrow">En construcción</p>
        <h1>
          Estamos construyendo
          <span class="accent">algo grande</span>.
        </h1>
        <p class="lede">
          ViTAH está dando forma al futuro de los hogares saludables, eficientes
          e inteligentes. Vuelve pronto.
        </p>

        <div class="cta-row">
          <a class="btn-primary" href="https://portal.vitah.es"
            >Acceder al portal</a
          >
          <a class="btn-ghost" href="mailto:hola@vitah.es">Contáctanos</a>
        </div>
      </div>

      <figure class="hero-illustration" aria-hidden="true">
        <img
          src="/assets/under-construction.svg"
          alt="Ilustración de una casa en construcción"
        />
      </figure>
    </main>

    <footer class="site-footer">
      <span>© <span id="year"></span> ViTAH</span>
      <span class="dot">·</span>
      <span>Tecnología para vivir mejor</span>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
