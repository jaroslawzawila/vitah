<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" role="img" aria-labelledby="title">
  <title id="title">Casa en construcción</title>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37505a" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#37505a" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Subtle backdrop -->
  <rect x="0" y="0" width="480" height="420" fill="url(#sky)" />

  <!-- Ground line -->
  <line x1="20" y1="360" x2="460" y2="360" stroke="#e8e7e2" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 6" />

  <!-- Scaffolding (back) -->
  <g stroke="#7d8e58" stroke-width="2.5" fill="none" stroke-linecap="round">
    <line x1="90" y1="360" x2="90" y2="120" />
    <line x1="380" y1="360" x2="380" y2="120" />
    <line x1="90" y1="170" x2="380" y2="170" />
    <line x1="90" y1="240" x2="380" y2="240" />
    <line x1="90" y1="310" x2="380" y2="310" />
    <!-- diagonal braces -->
    <line x1="90" y1="170" x2="160" y2="240" stroke-opacity="0.5" />
    <line x1="310" y1="240" x2="380" y2="310" stroke-opacity="0.5" />
  </g>

  <!-- House foundation -->
  <rect x="130" y="320" width="220" height="40" fill="#1e1e1e" stroke="#e8e7e2" stroke-opacity="0.35" stroke-width="1.5" />

  <!-- House walls (partial brick) -->
  <g>
    <rect x="135" y="230" width="210" height="90" fill="#6b7a4a" fill-opacity="0.18" stroke="#6b7a4a" stroke-width="1.5" />
    <!-- brick rows -->
    <g stroke="#6b7a4a" stroke-width="1" stroke-opacity="0.7">
      <line x1="135" y1="245" x2="345" y2="245" />
      <line x1="135" y1="260" x2="345" y2="260" />
      <line x1="135" y1="275" x2="345" y2="275" />
      <line x1="135" y1="290" x2="345" y2="290" />
      <line x1="135" y1="305" x2="345" y2="305" />
      <!-- vertical staggered joints -->
      <line x1="160" y1="230" x2="160" y2="245" />
      <line x1="200" y1="245" x2="200" y2="260" />
      <line x1="240" y1="230" x2="240" y2="245" />
      <line x1="280" y1="245" x2="280" y2="260" />
      <line x1="320" y1="230" x2="320" y2="245" />
      <line x1="175" y1="260" x2="175" y2="275" />
      <line x1="215" y1="275" x2="215" y2="290" />
      <line x1="255" y1="260" x2="255" y2="275" />
      <line x1="295" y1="275" x2="295" y2="290" />
      <line x1="180" y1="290" x2="180" y2="305" />
      <line x1="220" y1="305" x2="220" y2="320" />
      <line x1="260" y1="290" x2="260" y2="305" />
      <line x1="300" y1="305" x2="300" y2="320" />
    </g>
  </g>

  <!-- Door opening -->
  <rect x="220" y="265" width="40" height="55" fill="#1e1e1e" stroke="#e8e7e2" stroke-opacity="0.3" />

  <!-- Window frame (no glass yet) -->
  <g stroke="#37505a" stroke-width="2" fill="none">
    <rect x="155" y="250" width="40" height="35" />
    <line x1="175" y1="250" x2="175" y2="285" />
    <line x1="155" y1="267.5" x2="195" y2="267.5" />
  </g>
  <g stroke="#37505a" stroke-width="2" fill="none">
    <rect x="285" y="250" width="40" height="35" />
    <line x1="305" y1="250" x2="305" y2="285" />
    <line x1="285" y1="267.5" x2="325" y2="267.5" />
  </g>

  <!-- Roof frame (wood beams, triangular trusses — exposed) -->
  <g stroke="#e8e7e2" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- main triangle -->
    <polyline points="120,230 240,150 360,230" />
    <!-- horizontal tie beam -->
    <line x1="120" y1="230" x2="360" y2="230" />
    <!-- internal trusses -->
    <line x1="240" y1="150" x2="240" y2="230" />
    <line x1="180" y1="190" x2="240" y2="230" />
    <line x1="300" y1="190" x2="240" y2="230" />
    <line x1="180" y1="190" x2="180" y2="230" />
    <line x1="300" y1="190" x2="300" y2="230" />
  </g>

  <!-- Crane -->
  <g stroke="#e8e7e2" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- mast -->
    <line x1="410" y1="360" x2="410" y2="80" />
    <!-- jib (horizontal arm) -->
    <line x1="410" y1="100" x2="290" y2="100" />
    <!-- counter jib -->
    <line x1="410" y1="100" x2="445" y2="100" />
    <!-- support cable -->
    <line x1="410" y1="80" x2="310" y2="100" />
    <line x1="410" y1="80" x2="440" y2="100" />
    <!-- hoist line -->
    <line x1="320" y1="100" x2="320" y2="155" stroke-dasharray="3 3" />
    <!-- mast cross bracing -->
    <line x1="410" y1="160" x2="402" y2="180" />
    <line x1="410" y1="180" x2="418" y2="200" />
    <line x1="410" y1="200" x2="402" y2="220" />
    <line x1="410" y1="220" x2="418" y2="240" />
    <line x1="410" y1="240" x2="402" y2="260" />
    <line x1="410" y1="260" x2="418" y2="280" />
    <line x1="410" y1="280" x2="402" y2="300" />
    <line x1="410" y1="300" x2="418" y2="320" />
    <line x1="410" y1="320" x2="402" y2="340" />
  </g>

  <!-- Hanging beam (cargo) -->
  <rect x="305" y="155" width="30" height="8" fill="#6b7a4a" />

  <!-- Hard hat (foreground left, small detail) -->
  <g>
    <path d="M 50 355 Q 50 335 70 335 Q 90 335 90 355 Z" fill="#c75050" />
    <rect x="46" y="354" width="48" height="5" fill="#c75050" />
  </g>

  <!-- Construction sign -->
  <g transform="translate(60, 280)">
    <!-- post -->
    <line x1="15" y1="40" x2="15" y2="80" stroke="#e8e7e2" stroke-width="2" />
    <!-- diamond sign -->
    <g transform="rotate(45 15 25)">
      <rect x="0" y="10" width="30" height="30" fill="#6b7a4a" stroke="#e8e7e2" stroke-width="1.5" />
    </g>
    <!-- exclamation -->
    <line x1="15" y1="18" x2="15" y2="28" stroke="#e8e7e2" stroke-width="2.5" stroke-linecap="round" />
    <circle cx="15" cy="33" r="1.5" fill="#e8e7e2" />
  </g>

  <!-- Small bricks pile -->
  <g fill="#6b7a4a" fill-opacity="0.7">
    <rect x="120" y="350" width="14" height="6" />
    <rect x="135" y="350" width="14" height="6" />
    <rect x="127" y="344" width="14" height="6" />
  </g>
</svg>
