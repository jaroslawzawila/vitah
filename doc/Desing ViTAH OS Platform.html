<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViTAH OS — Plataforma de Gestión</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#6B7A4A;--gd:#4A5E2C;--gl:#8A9B62;--dark:#1E1E1E;--warm:#E8E7E2;--cream:#F5F4F0;--or:#C4632A;--bl:#2A5A8A;--tl:#2A6B7A;--sb:#12120E;--border:#E0DED8}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:var(--cream);display:flex;height:100vh;overflow:hidden;font-size:13px}
button{cursor:pointer;font-family:inherit}
input[type=range]{accent-color:var(--g);width:100%}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#D4D3CE;border-radius:3px}

#sidebar{width:210px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0}
#logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:10px}
#logo .mark{width:32px;height:32px;background:var(--g);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:16px;font-style:italic}
#logo .brand{color:#E8E7E2;font-weight:700;font-size:15px;letter-spacing:.5px}
#logo .sub{color:var(--g);font-size:8px;letter-spacing:2px;text-transform:uppercase}
nav{flex:1;padding:8px 0;overflow-y:auto}
nav button{width:100%;display:flex;align-items:center;gap:9px;padding:9px 16px;border:none;background:transparent;color:#8A8A82;cursor:pointer;text-align:left;font-size:12.5px;border-left:3px solid transparent;transition:all .12s}
nav button.active{background:rgba(107,122,74,.2);color:#E8E7E2;border-left-color:var(--g)}
nav button:hover:not(.active){background:rgba(255,255,255,.04);color:#B0B0A8}
#user-area{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:8px}
#user-area .avatar{width:26px;height:26px;border-radius:50%;background:var(--gd);display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700}
#user-area .name{color:#E8E7E2;font-size:11px;font-weight:600}
#user-area .loc{color:var(--g);font-size:9px}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:52px;background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
#topbar .title{flex:1;font-size:14px;font-weight:600;color:var(--dark)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.btn-primary{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--g);color:white;border:none;border-radius:6px;font-size:12px;font-weight:500}
.btn-primary:hover{background:var(--gd)}
.btn-icon{width:32px;height:32px;border:1px solid var(--border);background:white;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
#content{flex:1;overflow-y:auto;padding:16px 20px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.card{background:white;border-radius:10px;border:1px solid var(--border);padding:16px}
.card-title{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:12px}
.card-sm{background:white;border-radius:9px;border:1px solid var(--border);padding:14px}
.chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.row-sep{border-bottom:1px solid #F5F4F0}
.muted{color:#8A8A82;font-size:11px}
.pbar-wrap{height:4px;background:#E8E7E2;border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;border-radius:2px}

table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#F5F4F0;border-bottom:1px solid var(--border)}
th{padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:#6B6B6B}
td{padding:9px 12px;border-bottom:1px solid #F5F4F0}
tr:hover td{background:#FAFAF8}

.badge-green{background:#6B7A4A22;color:#4A5E2C}
.badge-orange{background:#C4632A22;color:#C4632A}
.badge-blue{background:#2A5A8A22;color:#2A5A8A}
.badge-muted{background:#F0EFE8;color:#8A8A82}

.cert-preview{border:2px solid var(--g);border-radius:12px;padding:20px;background:#FAFAF8;text-align:center}
.mobile-shell{width:220px;border:3px solid var(--dark);border-radius:28px;overflow:hidden;background:var(--cream);box-shadow:0 8px 28px rgba(0,0,0,.18)}
.mobile-header{background:var(--g);padding:12px 14px 8px;text-align:center}
.mobile-body{padding:10px;max-height:520px;overflow-y:auto}

.hito-row{display:flex;gap:10px;padding:8px;border-radius:8px;margin-bottom:3px}
.hito-circle{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.station-pill{height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;transition:all .15s}

.tab-btn{padding:6px 14px;border-radius:6px;border:none;font-size:11px;font-weight:500;transition:all .12s}
.tab-btn.active{background:var(--g);color:white}
.tab-btn:not(.active){background:#F5F4F0;color:#6B6B6B}
.tab-btn:not(.active):hover{background:#EAE9E4}

.toggle-section{display:none}.toggle-section.show{display:block}

.pipeline-box{text-align:center;flex:1}
.pipeline-count{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white;margin:0 auto 5px}
.pipeline-sep{color:#D4D3CE;font-size:14px;flex-shrink:0;padding:0 2px;margin-top:-16px}

.bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding:0 8px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-cols{display:flex;gap:2px;align-items:flex-end;flex:1}
.bar-rev{width:16px;border-radius:3px 3px 0 0;background:var(--g)}
.bar-cost{width:16px;border-radius:3px 3px 0 0;background:#8A9B6266}
.bar-label{font-size:10px;color:#8A8A82}

.status-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F5F4F0}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<div id="sidebar">
  <div id="logo">
    <div class="mark">V</div>
    <div><div class="brand">ViTAH</div><div class="sub">OS Platform</div></div>
  </div>
  <nav id="nav">
    <button class="active" onclick="setView('dashboard',this)"><span>⊞</span> Dashboard</button>
    <button onclick="setView('showroom',this)"><span>⌂</span> Showroom</button>
    <button onclick="setView('projects',this)"><span>◫</span> Proyectos</button>
    <button onclick="setView('technical',this)"><span>⚙</span> Dpto. Técnico</button>
    <button onclick="setView('logistics',this)"><span>◈</span> Logística</button>
    <button onclick="setView('construction',this)"><span>◧</span> Montaje / Obra</button>
    <button onclick="setView('client-app',this)"><span>▣</span> App Cliente</button>
    <button onclick="setView('finance',this)"><span>◉</span> Finanzas</button>
    <button onclick="setView('certifications',this)"><span>◆</span> Certificaciones</button>
  </nav>
  <div id="user-area">
    <div class="avatar">A</div>
    <div><div class="name">Admin ViTAH</div><div class="loc">Santander · HQ</div></div>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <div class="title" id="view-title">Dashboard</div>
    <div style="display:flex;align-items:center;gap:5px">
      <div class="sync-dot"></div>
      <span style="font-size:10px;color:#6B6B6B">Web · Plataforma · App <strong style="color:var(--g)">sincronizados</strong></span>
    </div>
    <button class="btn-primary" onclick="alert('Nuevo proyecto creado')">+ Nuevo Proyecto</button>
    <button class="btn-icon" onclick="alert('3 notificaciones pendientes')">🔔</button>
    <button class="btn-icon" onclick="alert('Configuración del sistema')">⚙</button>
  </div>
  <div id="content"></div>
</div>

<script>
const G='#6B7A4A',GD='#4A5E2C',GL='#8A9B62',DARK='#1E1E1E',OR='#C4632A',BL='#2A5A8A',TL='#2A6B7A';
const EUR=n=>'€'+Number(n).toLocaleString('es-ES');
const SL=['Showroom','Presupuesto','Dpto. Técnico','Revisión','Dossier','Logística','En Obra','Certificado'];
const SC=[G,GL,GD,OR,'#8B5E3C',TL,BL,'#1E6B3A'];
const PX=[
  {id:1,ref:'VTH-26-001',client:'García Ruiz',m2:140,type:'Unifamiliar',sN:0,pct:12,budget:285000,adv:'C. Vega',loc:'Santander',dt:'28 Abr'},
  {id:2,ref:'VTH-26-002',client:'Martínez López',m2:98,type:'Adosado',sN:2,pct:38,budget:198000,adv:'I. Orbegozo',loc:'Camargo',dt:'15 Mar'},
  {id:3,ref:'VTH-26-003',client:'Torres Const.',m2:175,type:'Dúplex',sN:6,pct:62,budget:340000,adv:'A. Pérez',loc:'Torrelavega',dt:'10 Ene'},
  {id:4,ref:'VTH-25-047',client:'Rodríguez Blanco',m2:120,type:'Unifamiliar',sN:7,pct:100,budget:245000,adv:'C. Sainz',loc:'Castro Urd.',dt:'5 Sep 25'},
  {id:5,ref:'VTH-26-004',client:'Fernández Díaz',m2:160,type:'Unifamiliar',sN:4,pct:52,budget:310000,adv:'M. Ruiz',loc:'Santander',dt:'2 Feb'},
  {id:6,ref:'VTH-26-005',client:'Blanco Herrero',m2:135,type:'Unifamiliar',sN:1,pct:25,budget:265000,adv:'L. Gómez',loc:'Santander',dt:'14 Abr'},
];
let m2=140,qual='premium',appTab='overview';

function chip(n){return`<span class="chip" style="background:${SC[n]}22;color:${SC[n]}">${SL[n]}</span>`}
function pbar(pct,c=G,h=4){return`<div class="pbar-wrap" style="height:${h}px"><div class="pbar-fill" style="width:${Math.min(pct,100)}%;background:${c}"></div></div>`}

function views(){return{
  dashboard:`
  <div class="grid4 mb12">
    ${[{l:'Proyectos Activos',v:'18',sub:'+3 este mes',c:G,i:'◎'},{l:'Obras en Curso',v:'6',sub:'2 nuevas semana',c:BL,i:'◉'},{l:'Facturación Mes',v:'124K€',sub:'↑ +12% anterior',c:GD,i:'◈'},{l:'Certif. 2026',v:'23',sub:'Objetivo: 40',c:'#1E6B3A',i:'◆'}].map(k=>`
    <div class="card-sm">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div class="muted" style="margin-bottom:6px">${k.l}</div><div style="font-size:24px;font-weight:700;color:${DARK}">${k.v}</div><div style="font-size:11px;color:${k.c};margin-top:3px">${k.sub}</div></div>
        <div style="width:34px;height:34px;border-radius:8px;background:${k.c}18;display:flex;align-items:center;justify-content:center;font-size:18px;color:${k.c}">${k.i}</div>
      </div>
    </div>`).join('')}
  </div>
  <div class="card mb12">
    <div class="card-title">Pipeline Global — ${PX.length} proyectos activos</div>
    <div style="display:flex;align-items:center">
      ${[{l:'Showroom',n:3,c:G},{l:'Presupuesto',n:2,c:GL},{l:'Técnico',n:4,c:GD},{l:'Revisión',n:1,c:OR},{l:'Dossier',n:2,c:'#8B5E3C'},{l:'Logística',n:2,c:TL},{l:'Obra',n:3,c:BL},{l:'Certif.',n:8,c:'#1E6B3A'}].map((s,i,a)=>`
      <div class="pipeline-box">
        <div class="pipeline-count" style="background:${s.c}">${s.n}</div>
        <div style="font-size:10px;color:#8A8A82;line-height:1.2">${s.l}</div>
      </div>${i<a.length-1?`<div class="pipeline-sep">›</div>`:''}`).join('')}
    </div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">Actividad Reciente</div>
      ${[{p:'García Ruiz',a:'Estación 4 completada — MEP seleccionado',t:'Hace 12 min',c:G},{p:'Torres Const.',a:'H6 validado — MEP rough-in completado',t:'Hace 1h',c:BL},{p:'Martínez López',a:'Proyecto básico enviado a revisión cliente',t:'Hace 3h',c:GD},{p:'Fernández Díaz',a:'Pedido de carpintería confirmado por proveedor',t:'Ayer 16:42',c:TL}].map(a=>`
      <div style="display:flex;gap:10px;margin-bottom:10px">
        <div class="dot" style="background:${a.c};margin-top:4px"></div>
        <div><div style="font-size:12px;font-weight:600;color:${DARK}">${a.p}</div>
        <div style="font-size:11px;color:#6B6B6B;margin-top:1px">${a.a}</div>
        <div style="font-size:10px;color:#AAAAAA">${a.t}</div></div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Estado del Sistema ViTAH OS</div>
      ${[{l:'Web vitah.es',s:'Online',c:'#2A7A4A',d:'SSL activo · CDN operativo'},{l:'Plataforma OS',s:'Activo',c:G,d:'18 usuarios conectados'},{l:'App iOS & Android',s:'Activo',c:G,d:'47 clientes con acceso activo'},{l:'Sincronización',s:'Tiempo real',c:BL,d:'WebSocket · última sync: 2s'},{l:'BIM / Revit Link',s:'Conectado',c:GD,d:'4 proyectos en BIM LOD 400'}].map(x=>`
      <div class="status-row">
        <div><div style="font-size:12px;color:${DARK};font-weight:500">${x.l}</div><div class="muted">${x.d}</div></div>
        <span class="chip" style="background:${x.c}18;color:${x.c}">${x.s}</span>
      </div>`).join('')}
    </div>
  </div>`,

  showroom:`
  <div style="display:grid;grid-template-columns:1fr 330px;gap:12px">
    <div>
      <div class="card mb12">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div><div style="font-size:13px;font-weight:700;color:${DARK}">Sesión Activa — García Ruiz</div>
          <div class="muted" style="margin-top:2px">VTH-26-001 · Asesor: C. Vega · 140m² Unifamiliar · Santander</div></div>
          <span class="chip" style="background:${G}22;color:${G}">● En curso — 52 min</span>
        </div>
        <div style="display:flex;gap:4px;align-items:flex-start">
          ${[['0','Gemelo Digital',true],['1','Core Acero',true],['2','Bio-Skin',true],['3','Carpintería',true],['4','MEP & 360',false,true],['5','Energy ZEB',false],['6','Life — Acabados',false]].map(([id,l,done,act])=>`
          <div style="flex:1;text-align:center">
            <div class="station-pill" style="background:${done?G:act?OR:'#F0EFE8'};margin-bottom:4px">
              <span style="color:${done||act?'white':'#AAAAAA'};font-size:9px;font-weight:700">${done?'✓':act?'▶':id}</span>
            </div>
            <div style="font-size:9px;color:#8A8A82;line-height:1.2">${l}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="card mb12">
        <div style="font-size:13px;font-weight:700;color:${DARK};margin-bottom:4px">EST 4 — MEP y Control 360</div>
        <div class="muted mb12">Sistema nervioso de la vivienda · App Gemelo Digital en tiempo real</div>
        ${[{l:'Domótica',opts:['KNX Premium','KNX Standard','Modbus Básico'],s:0},{l:'Ventilación VMC',opts:['Zehnder ComfoAir 350','Daikin VRV IV','Zehnder Basic'],s:0},{l:'Suelo Radiante',opts:['Uponor PEX-a Completo','Solo Planta Baja','Sin suelo radiante'],s:0},{l:'Contadores y EMS',opts:['Schneider IEM 3000','Schneider Basic','Solo monofásico'],s:0}].map(it=>`
        <div style="margin-bottom:10px">
          <div class="muted" style="margin-bottom:5px">${it.l}</div>
          <div style="display:flex;gap:5px">
            ${it.opts.map((o,i)=>`<button onclick="alert('Seleccionado: ${o}')" style="padding:5px 9px;font-size:11px;border-radius:6px;border:${i===it.s?`1.5px solid ${G}`:'1px solid var(--border)'};background:${i===it.s?G+'18':'white'};color:${i===it.s?GD:DARK};font-weight:${i===it.s?600:400}">${o}</button>`).join('')}
          </div>
        </div>`).join('')}
        <button onclick="alert('Estación 4 confirmada — avanzando a Estación 5')" class="btn-primary" style="margin-top:4px">Confirmar Estación 4 → Energy ZEB</button>
      </div>
      <div class="card">
        <div class="card-title">Próximas Visitas al Showroom</div>
        ${[{c:'Suárez Galindo',t:'Hoy 17:00',adv:'C. Vega',n:'Primera visita — interés 150m²'},{c:'Arce & Romero',t:'Mañana 10:30',adv:'I. Orbegozo',n:'Segunda visita — decidiendo acabados'},{c:'Fuentes Ibáñez',t:'Jue 15 May 11:00',adv:'A. Pérez',n:'Prospecto Franquicia Bilbao'}].map(v=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0" class="row-sep">
          <div><div style="font-size:12px;font-weight:600;color:${DARK}">${v.c}</div><div class="muted">${v.n}</div></div>
          <div style="text-align:right"><div style="font-size:11px;color:${G};font-weight:600">${v.t}</div><div style="font-size:10px;color:#AAAAAA">${v.adv}</div></div>
        </div>`).join('')}
      </div>
    </div>
    <div>
      <div class="card mb12">
        <div style="font-size:13px;font-weight:700;color:${DARK};margin-bottom:14px">Configurador de Presupuesto</div>
        <div style="margin-bottom:12px">
          <div class="muted" style="margin-bottom:6px">Superficie construida (m²)</div>
          <input type="range" min="60" max="300" value="${m2}" id="m2sl" oninput="updBudget(this.value)">
          <div style="font-size:22px;font-weight:700;color:${DARK};text-align:center;margin-top:4px" id="m2disp">${m2} m²</div>
        </div>
        <div style="margin-bottom:14px">
          <div class="muted" style="margin-bottom:6px">Nivel de acabados</div>
          ${[['standard','Estándar','1.650€/m²'],['premium','Premium','1.950€/m²'],['luxury','Luxury','2.200€/m²']].map(([v,l,p])=>`
          <button id="qbtn_${v}" onclick="setQual('${v}')" style="display:flex;justify-content:space-between;align-items:center;width:100%;padding:8px 10px;margin-bottom:4px;border:${qual===v?`1.5px solid ${G}`:'1px solid var(--border)'};border-radius:7px;background:${qual===v?G+'12':'white'}">
            <span style="font-size:12px;color:${qual===v?GD:DARK};font-weight:${qual===v?600:400}">${l}</span>
            <span class="muted">${p}</span>
          </button>`).join('')}
        </div>
        <div style="background:#F5F4F0;border-radius:8px;padding:12px;margin-bottom:14px" id="breakdown">
          <div class="muted" style="margin-bottom:8px">Desglose estimado</div>
          <div id="breaklines"></div>
          <div style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px;display:flex;justify-content:space-between">
            <span style="font-size:13px;font-weight:700;color:${DARK}">TOTAL ESTIMADO</span>
            <span style="font-size:15px;font-weight:700;color:${G}" id="totaldisp"></span>
          </div>
        </div>
        <button onclick="alert('Presupuesto PDF generado y enviado por email')" class="btn-primary" style="width:100%;justify-content:center;margin-bottom:6px">Generar Presupuesto PDF</button>
        <button onclick="alert('Proyecto enviado al Despacho Técnico para inicio de Proyecto Básico')" style="width:100%;padding:8px;background:white;color:${GD};border:1.5px solid ${G};border-radius:8px;font-size:12px;font-weight:500">Enviar al Despacho Técnico →</button>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:10px">Selecciones García Ruiz</div>
        ${[['Estructura','Acero Magnelis ZM310',true],['Panel envolvente','Thermochip 140mm',true],['Carpintería','PVC 5 cámaras Gris Antracita',true],['Aerotermia','Mitsubishi Ecodan 14kW',true],['MEP','Pendiente selección',false],['Acabados interiores','Pendiente selección',false]].map(([k,v,ok])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0" class="row-sep">
          <div><div class="muted">${k}</div><div style="font-size:11px;color:${DARK};font-weight:500">${v}</div></div>
          <span style="color:${ok?'#2A7A4A':'#AAAAAA'};font-weight:700;font-size:15px">${ok?'✓':'…'}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>`,

  projects:`
  <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
    <button class="btn-primary" style="padding:5px 12px">Todos (${PX.length})</button>
    ${SL.map((l,i)=>{const c=PX.filter(p=>p.sN===i).length;return c?`<button style="padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:white;color:#6B6B6B;font-size:11px" onclick="alert('Filtrando por: ${l}')">${l} (${c})</button>`:''}).join('')}

function updBudget(val){
  m2=+val;

  rebuildBreakdown();
}
function setQual(q){
  qual=q;
  document.querySelectorAll('[id^="qbtn_"]').forEach(b=>{
    const v=b.id.replace('qbtn_','');
    b.style.border=v===q?`1.5px solid ${G}`:'1px solid var(--border)';
    b.style.background=v===q?`${G}12`:'white';
    b.querySelector('span').style.fontWeight=v===q?600:400;
    b.querySelector('span').style.color=v===q?GD:DARK;
  });
  rebuildBreakdown();
}
function rebuildBreakdown(){
  const p=m2*(qual==='premium'?1950:qual==='standard'?1650:2200);
  const bl=document.getElementById('breaklines');
  if(bl)bl.innerHTML=[['Estructura ViTAH Core',0.30],['Envolvente Bio-Skin',0.18],['Instalaciones MEP',0.22],['Acabados interiores',0.20],['Dirección y Proyecto',0.10]].map(([k,r])=>`<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:#6B6B6B">${k}</span><span style="font-size:11px;font-weight:500;color:${DARK}">${EUR(Math.round(p*r))}</span></div>`).join('');
  const t=document.getElementById('totaldisp');if(t)t.textContent=EUR(p);
}
function setAppTab(tab){
  appTab=tab;
  document.getElementById('content').innerHTML=views()['client-app'];
  rebuildBreakdown();
}

const TITLES={dashboard:'Dashboard',showroom:'Showroom — Configurador & Sesiones',projects:'Proyectos — Pipeline Completo',technical:'Departamento Técnico',logistics:'Logística — Pedidos & Cronograma',construction:'Montaje / Obra — Seguimiento',['client-app']:'App Cliente — Seguimiento de Obra',finance:'Finanzas — Gestión & Facturación',certifications:'Certificaciones ViTAH'};

function setView(v,btn){
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.getElementById('view-title').textContent=TITLES[v]||v;
  document.getElementById('content').innerHTML=views()[v]||'';
  if(v==='showroom')rebuildBreakdown();
}

// Init
document.getElementById('content').innerHTML=views()['dashboard'];
